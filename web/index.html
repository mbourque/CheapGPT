<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheapGPT</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem("cheapgpt_theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/chatgpt.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- Mobile sidebar overlay -->
      <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

      <aside class="sidebar" id="sidebar" aria-label="Chat history">
        <div class="sidebar-rail" aria-label="Quick actions">
          <button type="button" class="btn-rail-icon" id="btnRailToggle" aria-label="Expand sidebar" title="Expand sidebar">
            <span class="icon-sidebar-panel"></span>
          </button>
          <button type="button" class="btn-rail-icon" id="btnRailNewChat" aria-label="New chat" title="New chat">
            <span class="icon-rail-new-chat"></span>
          </button>
          <button type="button" class="btn-rail-icon" id="btnRailRecents" aria-label="Recents" title="Recents">
            <span class="icon-rail-recents"></span>
          </button>
        </div>

        <div class="sidebar-top">
          <button type="button" class="btn-new-chat" id="btnNewChat" title="New chat">
            <span class="icon-top-new-chat" aria-hidden="true"></span>
            <span class="btn-new-chat-label">New chat</span>
          </button>
          <button
            type="button"
            class="btn-icon-only btn-sidebar-toggle"
            id="btnSidebarToggle"
            aria-label="Toggle sidebar"
          >
            <span class="icon-sidebar-panel"></span>
          </button>
        </div>

        <div class="sidebar-scroll">
          <button type="button" class="btn-sidebar-search" id="btnSidebarSearch" aria-label="Search chats">
            <span class="icon-search" aria-hidden="true"></span>
            <span>Search chats</span>
          </button>
          <section class="projects-block" id="projectsBlock" aria-label="Projects">
            <div class="projects-head">
              <button
                type="button"
                class="projects-toggle"
                id="btnProjectsToggle"
                aria-expanded="true"
                aria-controls="projectsListWrap"
              >
                <span>Projects</span>
                <span class="icon-projects-chevron" aria-hidden="true"></span>
              </button>
            </div>
            <div class="projects-list-wrap" id="projectsListWrap">
              <button type="button" class="btn-project-new" id="btnProjectNew">
                <span class="icon-folder-plus" aria-hidden="true"></span>
                <span>New Project</span>
              </button>
              <nav class="projects-list" id="projectList" role="list"></nav>
            </div>
          </section>
          <section class="recents-block" id="recentsBlock" aria-label="Recents">
            <div class="projects-head">
              <button
                type="button"
                class="projects-toggle"
                id="btnRecentsToggle"
                aria-expanded="true"
                aria-controls="recentsListWrap"
              >
                <span>Recents</span>
                <span class="icon-projects-chevron" aria-hidden="true"></span>
              </button>
            </div>
            <div class="recents-list-wrap" id="recentsListWrap">
              <nav class="chat-list" id="chatList" role="list"></nav>
            </div>
          </section>
          <section class="sidebar-archived-block" id="archivedSection">
            <button
              type="button"
              class="projects-toggle"
              id="btnArchivedToggle"
              aria-expanded="true"
              aria-controls="archivedListWrap"
            >
              <span>Archived</span>
              <span class="icon-projects-chevron" aria-hidden="true"></span>
            </button>
            <div class="archived-list-wrap" id="archivedListWrap">
              <nav class="chat-list" id="archivedChatList" role="list"></nav>
            </div>
          </section>
        </div>

        <div class="sidebar-footer">
          <div class="theme-switcher" role="group" aria-label="Appearance">
            <span class="theme-switcher-label">Theme</span>
            <div class="theme-segments" id="themeSegments">
              <button type="button" class="theme-seg" id="themeDark" data-theme-choice="dark" aria-pressed="false">
                <span class="icon-theme-moon" aria-hidden="true"></span>
                Dark
              </button>
              <button type="button" class="theme-seg" id="themeLight" data-theme-choice="light" aria-pressed="true">
                <span class="icon-theme-sun" aria-hidden="true"></span>
                Light
              </button>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-wrap">
        <header class="top-bar">
          <button
            type="button"
            class="btn-icon-only btn-sidebar-open"
            id="btnSidebarOpen"
            aria-label="Open sidebar"
          >
            <span class="icon-sidebar-panel"></span>
          </button>
          <div class="top-bar-title">
            <div class="model-picker" id="modelPicker">
              <button
                type="button"
                class="model-picker-btn"
                id="modelPickerBtn"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="modelPickerMenu"
                disabled
              >
                <span class="model-picker-label" id="modelPickerLabel">Loading models…</span>
                <span class="icon-model-chevron" aria-hidden="true"></span>
              </button>
              <div class="model-picker-menu" id="modelPickerMenu" role="listbox" aria-label="Models" hidden></div>
            </div>
          </div>
          <div class="top-bar-actions">
            <button
              type="button"
              class="btn-icon-only btn-top-new-chat"
              id="btnTopNewChat"
              aria-label="New chat"
              title="New chat"
            >
              <span class="icon-top-new-chat"></span>
            </button>
            <button
              type="button"
              class="btn-icon-only btn-temporary-chat"
              id="btnTemporaryChat"
              aria-label="Temporary chat mode"
              aria-pressed="false"
              title="Temporary chat mode"
            >
              <span class="icon-temporary-chat"></span>
            </button>
            <div class="chat-menu" id="chatMenu">
              <button
                type="button"
                class="btn-icon-only"
                id="btnChatMenu"
                aria-haspopup="menu"
                aria-expanded="false"
                aria-controls="chatMenuPanel"
                aria-label="Chat options"
              >
                <span class="icon-ellipsis"></span>
              </button>
              <div class="chat-menu-panel" id="chatMenuPanel" role="menu" hidden>
                <button
                  type="button"
                  class="chat-menu-item"
                  id="menuShare"
                  role="menuitem"
                  title="Preview and copy this conversation"
                  aria-label="Share conversation"
                >
                  <span class="chat-menu-item-icon icon-share"></span>
                  <span class="chat-menu-item-label">Share</span>
                </button>
                <button type="button" class="chat-menu-item" id="menuPinChat" role="menuitem">
                  <span class="chat-menu-item-icon icon-pin"></span>
                  <span class="chat-menu-item-label">Pin chat</span>
                </button>
                <button type="button" class="chat-menu-item" id="menuArchiveChat" role="menuitem">
                  <span class="chat-menu-item-icon icon-archive"></span>
                  <span class="chat-menu-item-label">Archive</span>
                </button>
                <button type="button" class="chat-menu-item chat-menu-item-danger" id="menuDeleteChat" role="menuitem">
                  <span class="chat-menu-item-icon icon-trash"></span>
                  <span class="chat-menu-item-label">Delete</span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <main class="thread" id="thread" aria-live="polite">
          <section class="project-workspace" id="projectWorkspace" hidden aria-label="Project chat history">
            <div class="project-workspace-head">
              <div class="project-workspace-title-row">
                <span class="project-workspace-title-icon icon-folder" aria-hidden="true"></span>
                <h2 class="project-workspace-title" id="projectWorkspaceTitle">Project</h2>
              </div>
            </div>
            <div class="project-workspace-body">
              <nav class="project-chat-list" id="projectChatList" role="list"></nav>
            </div>
          </section>
          <div class="temporary-chat-notice" id="temporaryChatNotice" hidden>
            <h2 class="temporary-chat-notice-title">Temporary Chat</h2>
            <p class="temporary-chat-notice-text">
              This chat won’t appear in your chat history.
            </p>
          </div>
          <div class="empty-state" id="emptyState">
            <h1 class="empty-state-title">What can I help with?</h1>
            <div class="suggestion-grid" id="suggestionGrid" role="group" aria-label="Suggestions"></div>
          </div>
          <div class="messages" id="messages" hidden></div>
        </main>

        <div class="composer-wrap">
          <div class="composer-inner">
            <button
              type="button"
              class="btn-scroll-bottom"
              id="btnScrollBottom"
              aria-label="Scroll to latest message"
              title="Jump to latest"
              hidden
            >
              <span class="icon-scroll-bottom" aria-hidden="true"></span>
            </button>
            <form class="composer" id="composerForm" autocomplete="off">
              <div class="composer-field">
                <div class="composer-quote-context" id="composerQuoteContext" hidden>
                  <span class="icon-quote-turn" aria-hidden="true"></span>
                  <span class="composer-quote-text" id="composerQuoteText"></span>
                  <button type="button" class="composer-quote-clear" id="btnComposerQuoteClear" aria-label="Remove quote">
                    <span class="share-modal-close-icon" aria-hidden="true"></span>
                  </button>
                </div>
                <textarea
                  id="messageInput"
                  class="composer-input"
                  rows="1"
                  placeholder="Ask anything"
                  maxlength="32000"
                ></textarea>
                <div class="composer-toolbar">
                  <button type="button" class="btn-icon-only btn-attach" disabled title="Attachments (later)" aria-label="Attach file">
                    <span class="icon-paperclip"></span>
                  </button>
                  <button type="button" class="btn-stop" id="btnStop" aria-label="Stop generating" title="Stop generating" hidden>
                    <span class="icon-stop"></span>
                  </button>
                  <button type="submit" class="btn-send" id="btnSend" aria-label="Send message" disabled>
                    <span class="icon-send"></span>
                  </button>
                </div>
              </div>
              <p class="composer-hint">
                <a href="https://github.com/mbourque/CheapGPT" target="_blank" rel="noopener noreferrer">CheapGPT</a> can make
                mistakes. Check important info.
              </p>
            </form>
          </div>
        </div>

        <section class="settings-page" id="settingsPage" hidden aria-label="Settings">
          <div class="settings-page-inner">
            <header class="settings-page-header">
              <h2 class="settings-page-title">Settings</h2>
            </header>
            <form class="settings-form" id="settingsForm" autocomplete="off">
              <label class="settings-field">
                <span class="settings-label">Ollama Host URL</span>
                <input
                  type="text"
                  class="settings-input"
                  id="settingsOllamaHost"
                  name="ollamaHost"
                  placeholder="http://127.0.0.1:11434"
                />
              </label>
              <label class="settings-field">
                <span class="settings-label">Model</span>
                <select class="settings-input" id="settingsModel" name="model">
                  <option value="">Select a model…</option>
                </select>
              </label>
              <label class="settings-field">
                <span class="settings-label">Custom Instructions</span>
                <textarea
                  class="settings-textarea"
                  id="settingsCustomInstructions"
                  placeholder="Coming soon"
                  disabled
                ></textarea>
              </label>
              <p class="settings-status" id="settingsStatus" hidden></p>
              <div class="settings-actions">
                <button type="button" class="settings-cancel" id="btnSettingsCancel">Cancel</button>
                <button type="submit" class="btn-send settings-apply" id="btnSettingsApply">
                  <span>Apply</span>
                </button>
              </div>
            </form>
          </div>
        </section>
      </div>

      <div class="share-modal-root" id="shareModalRoot" aria-hidden="true">
        <div class="share-modal-backdrop" id="shareModalBackdrop" aria-hidden="true"></div>
        <div
          class="share-modal"
          id="shareModal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="shareModalTitle"
          tabindex="-1"
        >
          <div class="share-modal-inner">
            <header class="share-modal-header">
              <h2 class="share-modal-title" id="shareModalTitle">Share</h2>
              <button type="button" class="share-modal-close" id="shareModalClose" aria-label="Close">
                <span class="share-modal-close-icon" aria-hidden="true"></span>
              </button>
            </header>
            <div class="share-modal-body">
              <div class="share-modal-preview-card" id="shareModalPreview" aria-label="Conversation preview"></div>
            </div>
            <footer class="share-modal-footer">
              <div class="share-modal-actions" role="group" aria-label="Copy conversation">
                <button type="button" class="share-modal-action" id="shareBtnCopyThread">
                  <span class="share-modal-action-circle" aria-hidden="true">
                    <span class="share-modal-action-icon icon-share-copy-w"></span>
                  </span>
                  <span class="share-modal-action-label">Copy conversation</span>
                </button>
              </div>
            </footer>
          </div>
        </div>
      </div>

      <div class="search-modal-root" id="searchModalRoot" aria-hidden="true">
        <div class="search-modal-backdrop" id="searchModalBackdrop" aria-hidden="true"></div>
        <div
          class="search-modal"
          id="searchModal"
          role="dialog"
          aria-modal="true"
          aria-label="Search chats"
          tabindex="-1"
        >
          <div class="search-modal-inner">
            <div class="search-modal-body">
              <div class="search-modal-input-wrap">
                <span class="icon-search" aria-hidden="true"></span>
                <input
                  type="text"
                  class="search-modal-input"
                  id="searchChatsInput"
                  placeholder="Search chats"
                  autocomplete="off"
                  spellcheck="false"
                />
                <button type="button" class="search-modal-input-close" id="searchModalClose" aria-label="Close search">
                  <span class="share-modal-close-icon" aria-hidden="true"></span>
                </button>
              </div>
              <div class="search-modal-results" id="searchModalResults" role="list" aria-label="Chat search results"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="project-modal-root" id="projectModalRoot" aria-hidden="true">
        <div class="project-modal-backdrop" id="projectModalBackdrop" aria-hidden="true"></div>
        <div class="project-modal" id="projectModal" role="dialog" aria-modal="true" aria-label="Create project" tabindex="-1">
          <form class="project-modal-form" id="projectModalForm" autocomplete="off">
            <h2 class="project-modal-title">Create project</h2>
            <label class="project-modal-field">
              <span>Project name</span>
              <input type="text" id="projectNameInput" class="project-modal-input" maxlength="100" required />
            </label>
            <div class="project-modal-actions">
              <button type="button" class="settings-cancel" id="btnProjectModalCancel">Cancel</button>
              <button type="submit" class="project-modal-submit">Create project</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
